<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>교통 및 정류장 검색 서비스</title>
    <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=dde5fcc52a30781e19e84123832d0003&libraries=services"></script>
    <style>
        /* 기본 스타일 초기화 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; font-family: 'Malgun Gothic', sans-serif; }

        /* 화면 분할 레이아웃 */
        .container { display: flex; width: 100%; height: 100vh; }

        /* 왼쪽 사이드바 */
        .sidebar {
            width: 350px;
            height: 100%;
            padding: 20px;
            background: #f8f9fa;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #ddd;
            z-index: 10;
        }

        .search-box { margin-bottom: 20px; }
        .search-box input {
            width: 75%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .search-box button {
            width: 20%;
            padding: 10px;
            background: #fae100;
            border: none;
            cursor: pointer;
            border-radius: 4px;
            font-weight: bold;
        }

        #result-list {
            flex-grow: 1;
            overflow-y: auto;
            list-style: none;
        }
        .place-item {
            padding: 15px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
            background: white;
            margin-bottom: 5px;
            border-radius: 4px;
        }
        .place-item:hover { background: #fffde0; }
        
        /* 실시간 정보 가상 스타일 */
        .bus-info {
            display: inline-block;
            margin-top: 5px;
            font-size: 12px;
            color: #e53935;
            background: #ffebee;
            padding: 2px 6px;
            border-radius: 3px;
        }

        /* 오른쪽 지도 영역 */
        #map { flex-grow: 1; height: 100%; }
    </style>
</head>
<body>

<div class="container">
    <div class="sidebar">
        <h2>교통/정류장 검색</h2>
        <div class="search-box">
            <input type="text" id="keyword" placeholder="장소나 정류장 입력">
            <button onclick="searchPlaces()">검색</button>
        </div>
        <ul id="result-list">
        </ul>
    </div>

    <div id="map"></div>
</div>

<script>
    let map; // 지도 객체
    let ps;  // 장소 검색 객체
    let infowindow; // 인포윈도우 객체
    let markers = []; // 생성된 마커들을 관리할 배열 (기존 마커 삭제용)

    // 마커 색상 구분을 위한 카카오 기본 마커 이미지 주소 (빨강, 파랑)
    const redMarkerUrl = "https://t1.daumcdn.net/localimg/localimages/07/mapapidoc/markerStar.png"; // 버스정류장용 (별 마커 예시)
    const blueMarkerUrl = "https://t1.daumcdn.net/localimg/localimages/07/2012/img/marker_p.png";    // 지하철역용 (파란색 P 마커)

    // 페이지 로드 시 실행
    window.onload = function() {
        initMap();
    };

    // 지도 초기화 함수
    function initMap() {
        const mapContainer = document.getElementById('map');
        const mapOption = {
            center: new kakao.maps.LatLng(37.566826, 126.9786567), // 기본 위치(서울시청)
            level: 5 // 확대 레벨 5
        };

        // 지도 생성
        map = new kakao.maps.Map(mapContainer, mapOption);
        
        // [기능 추가] 실시간 교통정보를 지도 위에 표시합니다
        map.addOverlayMapTypeId(kakao.maps.OverlayMapTypeId.TRAFFIC);
        
        // 장소 검색 객체 생성
        ps = new kakao.maps.services.Places();
        
        // 인포윈도우 생성
        infowindow = new kakao.maps.InfoWindow({zIndex:1});

        // [기능 수정] 현재 위치 가져오기 (실패하더라도 지도가 멈추지 않게 완전히 분리)
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(function(position) {
                const lat = position.coords.latitude;
                const lon = position.coords.longitude;
                const locPosition = new kakao.maps.LatLng(lat, lon);

                // 지도의 중심을 내 실제 위치로 이동
                map.setCenter(locPosition);
                
                // 내 위치에는 기본 마커로 "내 위치" 표시
                const myMarker = new kakao.maps.Marker({
                    map: map,
                    position: locPosition
                });
                markers.push(myMarker);
            }, function(error) {
                console.log("보안 또는 환경 문제로 현재 위치를 가져올 수 없어 기본 위치를 사용합니다.");
            });
        }
    }

    // 장소 검색 함수
    function searchPlaces() {
        const keyword = document.getElementById('keyword').value;

        if (!keyword.replace(/^\s+|\s+$/g, '')) {
            alert('키워드를 입력해주세요!');
            return false;
        }

        // 카카오 API로 장소 검색 요청
        ps.keywordSearch(keyword, placesSearchCB);
    }

    // 장소 검색 완료 시 호출되는 콜백 함수
    function placesSearchCB(data, status, pagination) {
        if (status === kakao.maps.services.Status.OK) {
            displayPlaces(data);
        } else if (status === kakao.maps.services.Status.ZERO_RESULT) {
            alert('검색 결과가 존재하지 않습니다.');
        } else if (status === kakao.maps.services.Status.ERROR) {
            alert('검색 결과 중 오류가 발생했습니다.');
        }
    }

    // 검색 결과 목록과 마커를 표출하는 함수
    function displayPlaces(places) {
        const listEl = document.getElementById('result-list');
        const bounds = new kakao.maps.LatLngBounds();
        
        // 새로운 검색을 하므로 기존 마커 지우기
        removeMarkers();
        listEl.innerHTML = ''; // 이전 결과 리스트 삭제

        for (let i = 0; i < places.length; i++) {
            const placePosition = new kakao.maps.LatLng(places[i].y, places[i].x);
            
            // [기능 추가] 지하철역과 버스정류장 구별하여 마커 색상 지정하기
            let markerColor = "red"; // 기본값 빨강
            // 카테고리 이름이나 장소명에 '지하철역' 또는 '역'이 포함되어 있으면 파란색으로 변경
            if (places[i].category_name.includes('지하철역') || places[i].place_name.endsWith('역')) {
                markerColor = "blue";
            }

            // 지도에 마커 표시 (색상 구분값 포함)
            const marker = displayMarker(placePosition, places[i].place_name, places[i].address_name, markerColor);

            // 왼쪽 리스트에 넣을 아이템 생성
            const itemEl = getListItem(i, places[i]); 

            // 지도 범위 재설정을 위해 좌표 추가
            bounds.extend(placePosition);

            // 리스트 클릭 시 해당 마커 위치로 이동하고 주소 팝업 띄우기
            itemEl.onclick = function() {
                map.panTo(placePosition);
                infowindow.setContent('<div style="padding:10px;font-size:12px;width:200px;"><strong>' + places[i].place_name + '</strong><br><span style="color:#666;">' + places[i].address_name + '</span></div>');
                infowindow.open(map, marker);
            };

            listEl.appendChild(itemEl);
        }
        
        // 검색된 정류장들이 다 보이도록 지도 화면 크기/위치 조정
        map.setBounds(bounds);
    }

    // 검색 결과 리스트 아이템 HTML 생성 (실시간 정보 포함)
    function getListItem(index, places) {
        const el = document.createElement('li');
        el.className = 'place-item';
        
        // 장소 종류에 따라 실시간 문구 커스텀
        let infoText = "⏱ [실시간 버스 정보 준비 중]";
        if (places.category_name.includes('지하철역') || places.place_name.endsWith('역')) {
            infoText = "🚇 [실시간 열차 정보 준비 중]";
        }

        el.innerHTML = `
            <strong>${places.place_name}</strong><br>
            <span style="font-size:13px; color:#666;">${places.address_name}</span><br>
            <span class="bus-info">${infoText}</span>
        `;
        return el;
    }

    // 지도에 마커를 생성하고 표시하는 함수
    function displayMarker(position, title, address, color) {
        let markerImage = null;

        // 색상 조건에 따라 마커 이미지 세팅
        if (color === "blue") {
            const imageSize = new kakao.maps.Size(24, 35);
            markerImage = new kakao.maps.MarkerImage(blueMarkerUrl, imageSize);
        } else if (color === "red") {
            const imageSize = new kakao.maps.Size(24, 35);
            markerImage = new kakao.maps.MarkerImage(redMarkerUrl, imageSize);
        }

        const marker = new kakao.maps.Marker({
            map: map,
            position: position,
            image: markerImage // 커스텀 마커 이미지 적용
        });

        // 마커 삭제를 위해 배열에 저장
        markers.push(marker);

        // 마커 클릭 시 주소 팝업(인포윈도우) 표시
        kakao.maps.event.addListener(marker, 'click', function() {
            infowindow.setContent('<div style="padding:10px;font-size:12px;width:200px;"><strong>' + title + '</strong><br><span style="color:#666;">' + address + '</span></div>');
            infowindow.open(map, marker);
        });

        return marker;
    }

    // 기존 마커들을 지도에서 지우는 함수
    function removeMarkers() {
        for (let i = 0; i < markers.length; i++) {
            markers[i].setMap(null);
        }            
        markers = [];
    }
</script>

</body>
</html>
